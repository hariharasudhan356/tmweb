<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Transformer Monitoring System</h1>
        <p>Live IoT Dashboard • All Readings History</p>
    </header>

    <div class="controls">
        <button onclick="loadData()">Refresh Now</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Voltage (V)</th>
                    <th>Current (A)</th>
                    <th>Power (W)</th>
                    <th>Temp (°C)</th>
                    <th>Vibration</th>
                    <th>Fault Active</th>
                    <th>Fault Message</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows filled by JavaScript -->
            </tbody>
        </table>
    </div>

    <div class="status-bar">
        <p id="status">Loading data...</p>
        <p id="last-updated">Last updated: --</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
